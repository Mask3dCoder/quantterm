# Pre-commit hooks for QuantTerm
# Install: pip install pre-commit && pre-commit install

repos:
  # Prevent __pycache__ and .pyc files from being committed
  - repo: local
    hooks:
      - id: forbid-cached-python
        name: Forbid __pycache__ and .pyc files
        entry: echo "ERROR: Do not commit __pycache__ or .pyc files"
        language: system
        types: [directory]
        types_or: [file]
        name: Prevent Python cache files
        entry: |
          bash -c 'if [ -n "$(find . -name '__pycache__' -type d 2>/dev/null)" ]; then echo "ERROR: Found __pycache__ directories"; exit 1; fi'
        stages: [pre-commit]
        always_run: true

  # Check for .pyc files
  - repo: local
    hooks:
      - id: forbid-pycache-files
        name: Forbid .pyc files
        entry: bash -c 'if [ -n "$(find . -name '*.pyc' -type f 2>/dev/null)" ]; then echo "ERROR: Found .pyc files"; exit 1; fi'
        language: system
        types: [file]
        name: Prevent .pyc files
        stages: [pre-commit]
        always_run: true

  # Prevent model artifacts
  - repo: local
    hooks:
      - id: forbid-model-files
        name: Forbid model artifacts
        entry: bash -c 'if [ -n "$(find . -name '*.pkl' -o -name '*.pickle' -type f 2>/dev/null | grep -v ^./.git/)" ]; then echo "ERROR: Found model files"; exit 1; fi'
        language: system
        types: [file]
        name: Prevent model files
        stages: [pre-commit]
        always_run: true

  # Ruff linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: [--fix]

  # Black formatter
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 23.11.0
    hooks:
      - id: black

  # mypy type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        additional_dependencies: [types-all]
        args: [--ignore-missing-imports]
