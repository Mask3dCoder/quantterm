version: 1
disable_existing_loggers: false

formatters:
  json:
    format: '{"timestamp": "%(asctime)s", "level": "%(levelname)s", "name": "%(name)s", "message": "%(message)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

  simple:
    format: '%(asctime)s | %(levelname)-8s | %(name)-20s | %(message)s'
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: '%(asctime)s | %(levelname)-8s | %(name)-20s | %(funcName)s:%(lineno)d | %(message)s'
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: quantterm.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: quantterm_errors.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  quantterm:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false

  quantterm.data:
    level: INFO
    handlers: [console, file]
    propagate: false

  quantterm.analytics:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  quantterm.derivatives:
    level: DEBUG
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console]
